
<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LinguaCNC" />

    <title>灵语智造 (LinguaCNC) - 开源社区驱动</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
      body {
        background-color: #f5f5f7;
        /* Vibrant Apple-like gradient orbs */
        background-image: 
          radial-gradient(at 0% 0%, rgba(10, 132, 255, 0.15) 0px, transparent 50%), 
          radial-gradient(at 100% 0%, rgba(255, 55, 95, 0.15) 0px, transparent 50%), 
          radial-gradient(at 100% 100%, rgba(48, 209, 88, 0.15) 0px, transparent 50%), 
          radial-gradient(at 0% 100%, rgba(255, 159, 10, 0.15) 0px, transparent 50%);
        background-attachment: fixed;
        background-size: cover;
        
        color: #1d1d1f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        -webkit-font-smoothing: antialiased;
        /* Prevent scroll bounce on mobile body */
        overscroll-behavior-y: none;
        user-select: none; /* Make it feel more like an app */
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* Custom Scrollbar - Light Mode */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1); 
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.2); 
        border: 2px solid transparent;
        background-clip: content-box;
      }
      
      .glass-panel {
        /* Enhanced Gaussian Blur */
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(30px) saturate(150%);
        -webkit-backdrop-filter: blur(30px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
      }
      
      /* Safe area padding utilities */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* Animation classes */
      .animate-fade-in {
        animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .animate-slide-up {
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
